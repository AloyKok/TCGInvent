name: Apply product type support

on:
  push:
    paths:
      - .github/workflows/apply-product-types.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply tested product type commit
        env:
          PATCH_B64: 
        run: |
          printf '%s' "$PATCH_B64" | base64 --decode | gzip --decompress > /tmp/product-types.patch
          git apply --index /tmp/product-types.patch
          git rm .github/workflows/apply-product-types.yml
          git config user.name "Codex"
          git config user.email "codex@users.noreply.github.com"
          git commit -m "Support sealed products and mystery packs"
          git push origin HEAD:main
